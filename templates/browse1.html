<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Type</title>
  <style>
    .status-container {
      display: flex;
      flex-wrap: wrap;
      max-width: 100%;
      gap: 5px;
    }
    .status-option {
      cursor: pointer;
      user-select: none;
      padding: 3px 6px;
      font-size:14px;
      border: 1px solid #ccc;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .state-1 {
      background-color: rgb(39, 7, 246);
      color: black;
    }
    .state-2 {
      background-color: rgb(240, 10, 37);
      color: white;
    }
  </style>
</head>
<body>
  <form method="POST" action="/search">
  {%for ftypes, fs in FT.items()%}
    <h3>{{ftypes.upper()}}</h3>
    <div class="status-container">
    {%for f in fs%}
      <label class="status-option" data-state="0">
        <input type="hidden" style="display:none" name="filters" value="{{ftypes}}|{{f}}:0"> {{f}}
      </label>
    {%endfor%}
    </div>
  {%endfor%}
  <button type="submit" class="btn btn-success" style='margin-top: 20px'>Search</button>
  </form>
  <script>
    const options = document.querySelectorAll('.status-option');

    options.forEach(option => {
      option.addEventListener('click', function() {
        let state = parseInt(this.dataset.state);
        state = (state + 1) % 3; // cycles 0 → 1 → 2 → 0
        this.dataset.state = state;

        const hiddenInput = this.querySelector('input[name="filters"]');

        this.classList.remove('state-1', 'state-2');
        if (state === 0) {
          hiddenInput.value = hiddenInput.value.split(":")[0] + ":0";
        } else if (state === 1) {
          this.classList.add('state-1');
          hiddenInput.value = hiddenInput.value.split(":")[0] + ":1";
        } else if (state === 2) {
          this.classList.add('state-2');
          hiddenInput.value = hiddenInput.value.split(":")[0] + ":2";
        }

      });
    });
  </script>
</body>
</html>
