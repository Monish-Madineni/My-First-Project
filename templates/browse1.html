<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Type</title>
  <style>
    .status-container {
      display: flex;
      gap: 20px;
    }
    .status-option {
      cursor: pointer;
      user-select: none;
      padding: 5px 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.3s, color 0.3s;
    }
    .state-1 {
      background-color: rgb(235, 7, 7);
      color: black;
    }
    .state-2 {
      background-color: rgb(42, 13, 227);
      color: white;
    }
  </style>
</head>
<body>
  <h3>College Type</h3>
  <div class="status-container">
    <label class="status-option" data-state="0">
      <input type="checkbox" style="display:none" value="PVT"> PVT
    </label>
    <label class="status-option" data-state="0">
      <input type="checkbox" style="display:none" value="GOVT"> GOVT
    </label>
    <label class="status-option" data-state="0">
      <input type="checkbox" style="display:none" value="UNIV"> UNIV
    </label>
  </div>

  <script>
    const options = document.querySelectorAll('.status-option');

    options.forEach(option => {
      option.addEventListener('click', function() {
        let state = parseInt(this.dataset.state);
        state = (state + 1) % 3; // cycles 0 → 1 → 2 → 0
        this.dataset.state = state;

        // Update styles based on state
        this.classList.remove('state-1', 'state-2');
        if(state === 1) this.classList.add('state-1'); // green
        if(state === 2) this.classList.add('state-2'); // red
      });
    });
  </script>
</body>
</html>
