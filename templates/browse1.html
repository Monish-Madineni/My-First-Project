<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Type</title>
  <style>
    .status-container {
      display: flex;
      gap: 20px;
    }
    .status-option {
      cursor: pointer;
      user-select: none;
      padding: 5px 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.3s, color 0.3s;
    }
    .state-1 {
      background-color: rgb(235, 7, 7);
      color: black;
    }
    .state-2 {
      background-color: rgb(42, 13, 227);
      color: white;
    }
  </style>
</head>
<body>
  <h3>College Type</h3>
  <div class="status-container">
  </div>

  <script>
    var types=['PVT','GOVT','UNIV'];
    const ctype=document.querySelector('.status-container')
    types.forEach(type=>{
      var child=document.createElement("label");
      child.setAttribute("data-state","0");
      var gchild=document.createElement("input");
      gchild.type="checkbox";
      child.classList.add("status-option");
      gchild.value=type;
      gchild.style.display="none";
      child.addEventListener("click",()=>{
        let c=parseInt(child.dataset.state);
        c=(c+1)%3;
        child.dataset.state=c;
        child.classList.remove("state-1","state-2");
        if (c === 1) child.classList.add("state-1");
        if (c === 2) child.classList.add("state-2");
        if (c === 0) child.classList.add("none");
      })
      child.appendChild(gchild);
      child.appendChild(document.createTextNode(" " + type));
      ctype.appendChild(child);
    });

  </script>
</body>
</html>
